name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify docs exist
        run: |
          test -f README.md
          test -f docs/ULUOS_INTEGRATION_ROADMAP.md
          test -f docs/ULUOS_SERVICE_REGISTRY.md
          test -f docs/ULUOS_ARCHITECTURE.md
          test -f docs/ULUOS_SERVICE_CONTRACT.md
          test -f docs/ULUOS_CAPABILITY_SCHEMA.md
          test -f docs/LOCAL_DEVELOPMENT.md
          test -f docs/SERVICE_ONBOARDING.md
          test -f docs/GOLDEN_PATH_DORKFI.md
          test -f docs/IMPLEMENTATION_STATUS.md

      - name: Verify infra files exist
        run: |
          test -f infra/docker-compose.yml
          test -f infra/.env.example

      - name: Verify gateway files exist
        run: |
          test -f gateway/package.json
          test -f gateway/Dockerfile
          test -f gateway/config.example.json
          test -f gateway/services.json
          test -f gateway/service-registry.schema.json
          test -f gateway/capability.schema.json
          test -f gateway/src/index.js

      - name: Verify capability examples exist
        run: |
          test -f examples/capabilities/core.json
          test -f examples/capabilities/wallet.json
          test -f examples/capabilities/broadcast.json
          test -f examples/capabilities/voi.json
          test -f examples/capabilities/algorand.json
          test -f examples/capabilities/dorkfi.json
          test -f examples/capabilities/envoi.json

      - name: Validate JSON files
        run: |
          for f in gateway/*.json examples/capabilities/*.json; do
            echo "Validating $f"
            python3 -c "import json; json.load(open('$f'))"
          done

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: gateway
        run: npm ci

      - name: Verify gateway starts
        working-directory: gateway
        run: |
          cp config.example.json config.json
          timeout 5 node src/index.js || true
