networks:
  uluos-public:
    driver: bridge
  uluos-private:
    driver: bridge
    internal: true

x-mcp-stub: &mcp-stub
  image: node:20-alpine
  working_dir: /app
  command: ["node", "stub-server.js"]
  volumes:
    - ./stub-server.js:/app/stub-server.js:ro
  networks:
    - uluos-private

x-mcp-healthcheck: &mcp-healthcheck
  interval: 5s
  timeout: 3s
  retries: 3
  start_period: 3s

services:
  # --- Control Plane (public-facing) ---
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    env_file: .env.example
    environment:
      NODE_ENV: development
      PORT: 3000
      SERVICES_CONFIG: /app/services.json
      CAPABILITIES_DIR: /examples/capabilities
    volumes:
      - ../gateway:/app
      - ../examples:/examples
      - gateway_modules:/app/node_modules
    working_dir: /app
    command: ["node", "src/index.js"]
    depends_on:
      core-mcp:
        condition: service_healthy
      wallet-mcp:
        condition: service_healthy
      broadcast-mcp:
        condition: service_healthy
      voi-mcp:
        condition: service_healthy
      algorand-mcp:
        condition: service_healthy
      dorkfi-mcp:
        condition: service_healthy
      envoi-mcp:
        condition: service_healthy
      aramid-bridge-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - uluos-public
      - uluos-private

  # --- Infrastructure Layer ---
  core-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3001
      SERVICE_NAME: core
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]

  wallet-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3002
      SERVICE_NAME: wallet
    volumes:
      - ./stub-server.js:/app/stub-server.js:ro
      - wallet_data:/data/wallet-store
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]

  broadcast-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3003
      SERVICE_NAME: broadcast
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]

  # --- Ecosystem Meaning Layer ---
  voi-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3004
      SERVICE_NAME: voi
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]

  algorand-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3005
      SERVICE_NAME: algorand
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]

  # --- Protocol Layer ---
  dorkfi-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3006
      SERVICE_NAME: dorkfi
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]

  envoi-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3007
      SERVICE_NAME: envoi
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]

  aramid-bridge-mcp:
    <<: *mcp-stub
    environment:
      PORT: 3008
      SERVICE_NAME: aramid-bridge
    healthcheck:
      <<: *mcp-healthcheck
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/health"]

  # --- Node Services (disabled by default for local dev) ---
